<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Breva Coffee</title>
  <meta name="description" content="Breva Coffee — Pilihan minuman kopi segar.">
  <meta name="theme-color" content="#553125">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/catalog.css">
</head>
<body>

  <!-- ===================================================
       STEP 1 — PILIH PICKUP / DELIVERY + TANGGAL
       =================================================== -->
  <div id="step1" class="step active">
    <div class="onboarding">

      <!-- Brand -->
      <div class="ob-brand">
        <span class="ob-brand-icon">☕</span>
        <span class="ob-brand-name">Breva Coffee</span>
      </div>

      <!-- Headline -->
      <h1 class="ob-headline">Mau pickup<br>atau delivery?</h1>
      <p class="ob-sub">Pilih dulu, baru lihat menu 👇</p>

      <!-- Order Type Cards -->
      <div class="order-type-grid">
        <div class="order-type-card" data-type="pickup" onclick="selectOrderType(this)">
          <span class="order-type-icon">🏠</span>
          <span class="order-type-name">Pickup</span>
          <span class="order-type-desc">Ambil sendiri</span>
        </div>
        <div class="order-type-card" data-type="delivery" onclick="selectOrderType(this)">
          <span class="order-type-icon">🛵</span>
          <span class="order-type-name">Delivery</span>
          <span class="order-type-desc">Dikirim ke kamu</span>
        </div>
      </div>

      <!-- Pickup Address (shown when pickup selected) -->
      <div class="pickup-address-card" id="pickupAddressCard">
        <span class="pickup-pin">📍</span>
        <div>
          <div class="pickup-info-label">Lokasi Pickup</div>
          <div class="pickup-info-name">Breva Coffee</div>
          <div class="pickup-info-addr" id="pickupAddr"></div>
          <div class="pickup-info-hours" id="pickupHours"></div>
          <a class="pickup-maps-link" id="pickupMapsLink" href="#" target="_blank" rel="noopener">
            Buka di Google Maps →
          </a>
        </div>
      </div>

      <!-- Date Selection (shown after order type selected) -->
      <div class="date-section" id="dateSection">
        <div class="date-section-label" id="dateSectionLabel">Pilih Tanggal Pickup</div>
        <div class="date-chips-wrap" id="dateChips"></div>
      </div>

      <!-- CTA -->
      <div class="ob-footer">
        <button class="btn-next" id="btnNext" onclick="goToStep2()" disabled>
          Lihat Menu →
        </button>
      </div>

    </div>
  </div>

  <!-- ===================================================
       STEP 2 — KATALOG PRODUK
       =================================================== -->
  <div id="step2" class="step">

    <!-- Sticky topbar -->
    <div class="catalog-topbar">
      <button class="topbar-back" onclick="goBack()" aria-label="Kembali">←</button>
      <div class="topbar-info">
        <div class="topbar-type" id="topbarType">Pickup</div>
        <div class="topbar-date" id="topbarDate">Pilih tanggal...</div>
      </div>
    </div>

    <!-- Products -->
    <main class="products-section">
      <div class="section-title">Menu Kami</div>
      <div class="products-grid" id="productsGrid">
        <div class="loading-state">
          <div class="spinner"></div>
          <span>Memuat menu...</span>
        </div>
      </div>
    </main>

  </div>

  <!-- ===================================================
       FLOATING CART (step 2 only)
       =================================================== -->
  <div class="floating-cart" id="floatingCart" style="display:none">
    <button class="cart-toggle-btn" onclick="toggleCart()" aria-label="Buka keranjang">
      🛒
      <span class="cart-badge hidden" id="cartBadge">0</span>
    </button>
  </div>

  <!-- ===================================================
       CART OVERLAY + PANEL
       =================================================== -->
  <div class="cart-overlay" id="cartOverlay" onclick="toggleCart()"></div>

  <div class="cart-panel" id="cartPanel">
    <div class="drag-handle"></div>
    <div class="cart-panel-header">
      <h3>Keranjang 🛒</h3>
      <button class="modal-close" onclick="toggleCart()">✕</button>
    </div>
    <div class="cart-items-list" id="cartItemsList"></div>
    <div class="cart-panel-footer">
      <div class="cart-total-row">
        <span class="cart-total-label">Total</span>
        <span class="cart-total-amount" id="cartTotalAmount">Rp 0</span>
      </div>
      <button class="btn-checkout-main" id="checkoutBtn" onclick="openCheckout()" disabled>
        Checkout via WhatsApp 📱
      </button>
    </div>
  </div>

  <!-- ===================================================
       CHECKOUT MODAL
       =================================================== -->
  <div class="modal-overlay" id="checkoutModal">
    <div class="modal-box">
      <div class="modal-header">
        <h3>Detail Pesanan</h3>
        <button class="modal-close" onclick="closeCheckout()">✕</button>
      </div>

      <!-- Order meta + summary -->
      <div class="order-summary" id="orderSummary"></div>

      <!-- Form -->
      <form id="checkoutForm" onsubmit="submitOrder(event)" novalidate>
        <div class="form-group">
          <label for="customerName">Nama Pemesan</label>
          <input type="text" id="customerName" placeholder="Nama kamu..." required autocomplete="name">
        </div>

        <div class="form-group">
          <label for="customerWA">Nomor WhatsApp</label>
          <input type="tel" id="customerWA" placeholder="08xxxxxxxxxx" required autocomplete="tel">
        </div>

        <!-- Delivery address (shown only for delivery) -->
        <div class="form-group" id="addressGroup" style="display:none">
          <label for="customerAddress">Alamat Pengiriman</label>
          <textarea id="customerAddress" placeholder="Tulis alamat lengkap di sini..." rows="3"></textarea>
        </div>

        <div class="form-group">
          <label for="customerNote">Catatan (Opsional)</label>
          <textarea id="customerNote" placeholder="Ada pesan khusus?" rows="2"></textarea>
        </div>

        <button type="submit" class="btn btn-primary btn-wa-submit">
          Kirim Pesanan via WhatsApp 📱
        </button>
      </form>
    </div>
  </div>

  <!-- ===================================================
       TOAST CONTAINER
       =================================================== -->
  <div class="toast-container" id="toastContainer" aria-live="polite"></div>

  <!-- ===================================================
       SCRIPTS
       =================================================== -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/catalog.js"></script>

</body>
</html>
